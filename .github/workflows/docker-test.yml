name: Docker Test CI

on:
  pull_request:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Build the main Docker image
      run: docker build . --file Dockerfile --tag n8n-custom:$(date +%s)
    - name: Build the runner Docker image
      run: docker build . --file Dockerfile-runner --tag n8n-custom-runner:$(date +%s)
